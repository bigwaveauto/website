<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 380px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fb; }

    .header { padding: 16px; background: #1e293b; color: white; }
    .header h1 { font-size: 15px; font-weight: 800; }
    .header p { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    .body { padding: 16px; }

    .status { padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }
    .status.show { display: block; }
    .status.info { background: #eff6ff; color: #1d4ed8; }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status.working { background: #fef9c3; color: #854d0e; }

    .config { margin-bottom: 16px; }
    .config label { display: block; font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .config input { width: 100%; padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 13px; font-family: inherit; }
    .config input:focus { outline: none; border-color: #2563eb; }
    .config .hint { font-size: 11px; color: #999; margin-top: 3px; }

    .vin-display { padding: 10px 12px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; }
    .vin-display .label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; }
    .vin-display .value { font-size: 16px; font-weight: 800; color: #111; font-family: 'SF Mono', monospace; letter-spacing: 0.5px; }

    .photos-preview { max-height: 200px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
    .photos-preview img { width: 56px; height: 42px; object-fit: cover; border-radius: 4px; border: 1px solid #e2e8f0; }

    .photo-count { font-size: 13px; color: #555; margin-bottom: 12px; font-weight: 600; }

    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; margin-bottom: 8px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-scan { background: #1e293b; color: white; }
    .btn-scan:hover:not(:disabled) { background: #334155; }
    .btn-send { background: #2563eb; color: white; }
    .btn-send:hover:not(:disabled) { background: #1d4ed8; }
    .btn-download { background: white; color: #333; border: 1.5px solid #e2e8f0; }
    .btn-download:hover:not(:disabled) { background: #f8f9fb; border-color: #ccc; }

    .no-photos { text-align: center; padding: 20px; color: #999; font-size: 13px; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <h1>Big Wave Auto</h1>
    <p>Manheim Photo Grabber</p>
  </div>

  <div class="body">
    <div id="status" class="status"></div>

    <div class="config">
      <label>Server URL</label>
      <input id="serverUrl" type="text" placeholder="https://bigwaveauto.com" />
      <div class="hint">Your Big Wave Auto site URL</div>
    </div>
    <div class="config">
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="Enter API key" />
      <div class="hint">Extension API key from server</div>
    </div>

    <div id="vinSection" class="vin-display" style="display:none">
      <div class="label">VIN Detected</div>
      <div class="value" id="vinValue"></div>
    </div>

    <button id="scanBtn" class="btn btn-scan">Scan Page for Photos</button>

    <div id="resultsSection" style="display:none">
      <div id="photoCount" class="photo-count"></div>
      <div id="photosPreview" class="photos-preview"></div>
      <button id="sendBtn" class="btn btn-send">Send to Vehicle Profile</button>
      <button id="downloadBtn" class="btn btn-download">Download All as ZIP</button>
    </div>

    <div id="noPhotos" class="no-photos" style="display:none">
      No photos found. Make sure you're on a Manheim listing or condition report page.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
