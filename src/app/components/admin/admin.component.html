@if(checking()){
<div class="adm-loading">
  <div class="adm-spinner"></div>
  <span>Verifying access…</span>
</div>
}@else if(!authorized()){
<div class="adm-login">
  <div class="adm-login-card">
    <div class="adm-login-brand">
      <span class="adm-login-wave">🌊</span>
      <span class="adm-login-title">Big Wave Auto</span>
      <span class="adm-login-sub">Dealer Management System</span>
    </div>
    @if(loginError()){
    <div class="adm-login-error">
      <lucide-icon name="shield" />
      <span>{{ loginError() }}</span>
    </div>
    }
    <button class="adm-login-google" (click)="adminSignIn()">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
  </div>
</div>
}@else{
<div class="adm-shell">

  <!-- Sidebar -->
  <aside class="adm-sidebar">
    <div class="adm-sidebar-brand">
      <span class="adm-brand-wave">🌊</span>
      <div>
        <span class="adm-brand-name">Big Wave Auto</span>
        <span class="adm-brand-sub">Dealer Management</span>
      </div>
    </div>

    <nav class="adm-nav">
      @for(item of navItems; track item.route){
      <a [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: item.route === '/admin' }" class="adm-nav-item">
        <lucide-icon [name]="item.icon" />
        <span>{{ item.label }}</span>
      </a>
      }
    </nav>

    <div class="adm-sidebar-footer">
      <div class="adm-user">
        <lucide-icon name="user" />
        <span>{{ auth.user()?.email }}</span>
      </div>
      <a routerLink="/" class="adm-nav-item adm-back-link">
        <lucide-icon name="arrow-left" />
        <span>Back to Website</span>
      </a>
      <button class="adm-nav-item adm-back-link" (click)="adminSignOut()">
        <lucide-icon name="log-out" />
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="adm-main">
    <router-outlet />
  </main>

</div>
}
